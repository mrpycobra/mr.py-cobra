<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR.PY-COBRA • GOD LEVEL MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#00ffcc}
body{background:#000;color:#eaffff;font-family:Arial}
html{scroll-behavior:smooth}

/* NAV */
.nav{
 position:fixed;top:0;width:100%;
 display:flex;justify-content:space-between;
 padding:12px;background:rgba(0,0,0,.7);
 backdrop-filter:blur(10px);
}
.nav a{color:#00ffcc;margin:0 10px;text-decoration:none}

/* SECTION */
.section{padding:100px 20px;text-align:center}

/* HERO */
.hero img{width:130px;border-radius:50%;animation:float 3s infinite}
@keyframes float{50%{transform:translateY(-10px)}}

h1,h2{text-shadow:0 0 10px #00ffcc}

/* DASHBOARD */
.dashboard{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;margin-top:30px;
}
.card{
 background:rgba(255,255,255,0.05);
 padding:20px;border-radius:12px;
 backdrop-filter:blur(10px);
 box-shadow:0 0 10px #00ffcc;
}
.card h3{margin-bottom:10px}

/* SEARCH */
.search-box{
 margin-top:30px;
}
.search-box input{
 padding:10px;width:250px;
 border:none;border-radius:6px;
}

/* VIDEO GRID */
.video-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;margin-top:30px
}
.video-card{
 background:rgba(255,255,255,0.05);
 border-radius:12px;
 overflow:hidden;
 cursor:pointer;
 transition:.3s;
}
.video-card:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #00ffcc;
}
.video-card img{width:100%}
.video-title{padding:10px;font-size:.9em}

/* POPUP */
#popup{
 position:fixed;inset:0;
 background:rgba(0,0,0,.9);
 display:none;
 justify-content:center;
 align-items:center;
}
#popup iframe{
 width:90%;max-width:800px;height:450px;
}
#popup span{
 position:absolute;top:20px;right:30px;
 font-size:30px;cursor:pointer;color:#00ffcc;
}

/* NOTES */
.note-card{
 margin:30px auto;padding:20px;
 max-width:700px;
 background:rgba(255,255,255,0.05);
 border-radius:12px;
}
.note-card iframe{
 width:100%;height:300px;border:none;margin:10px 0
}

.btn{
 padding:10px 20px;background:#00ffcc;
 color:#000;border-radius:6px;text-decoration:none
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
 <div>MR.PY-COBRA</div>
 <div>
  <a href="#home">Home</a>
  <a href="#dashboard">Dashboard</a>
  <a href="#videos">Videos</a>
  <a href="#notes">Notes</a>
 </div>
</div>

<!-- HOME -->
<div id="home" class="section hero">
 <img src="logo.png">
 <h1>MR.PY-COBRA</h1>
 <p>Stay Relevant</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
 <h2>📊 Dashboard</h2>

 <div class="dashboard">
  <div class="card">
   <h3>Subscribers</h3>
   <p id="subs">0</p>
  </div>
  <div class="card">
   <h3>Views</h3>
   <p id="views">0</p>
  </div>
  <div class="card">
   <h3>Total Videos</h3>
   <p id="totalVideos">0</p>
  </div>
 </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
 <h2>🎥 Videos</h2>

 <div class="search-box">
  <input type="text" placeholder="Search videos..." oninput="searchVideos(this.value)">
 </div>

 <div id="videoGrid" class="video-grid"></div>
</div>

<!-- NOTES -->
<div id="notes" class="section">
 <h2>📄 Notes</h2>

 <div class="note-card">
  <h3>Turtle Graphics</h3>
  <iframe src="turtle_graphics_mrpycobra.pdf"></iframe>
  <a href="turtle_graphics_mrpycobra.pdf" class="btn" download>Download</a>
 </div>

 <div class="note-card">
  <h3>Python Basics</h3>
  <iframe src="python_basics_mrpycobra.pdf"></iframe>
  <a href="python_basics_mrpycobra.pdf" class="btn" download>Download</a>
 </div>
</div>

<!-- VIDEO POPUP -->
<div id="popup">
 <span onclick="closeVideo()">✖</span>
 <iframe id="player"></iframe>
</div>

<script>

const API_KEY="AIzaSyC6otTi6DVaCjUSuSWd0Lo9Z2zyEajIuFg";
const CHANNEL_ID="UCGb3jgOzfQsdENrlFWRB_Bw";

let allVideos=[];

/* ANIMATE */
function animate(id,end){
 let i=0;
 let step=Math.ceil(end/100);
 let el=document.getElementById(id);
 let interval=setInterval(()=>{
  i+=step;
  if(i>=end){i=end;clearInterval(interval);}
  el.innerText=i;
 },20);
}

/* DASHBOARD */
async function loadDashboard(){
 const res=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
 const data=await res.json();
 const s=data.items[0].statistics;

 animate("subs",parseInt(s.subscriberCount));
 animate("views",parseInt(s.viewCount));
 animate("totalVideos",parseInt(s.videoCount));
}

/* VIDEOS */
async function loadVideos(){
 const res=await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&maxResults=12`);
 const data=await res.json();

 allVideos=data.items.filter(v=>v.id.videoId);
 displayVideos(allVideos);
}

function displayVideos(videos){
 let html="";
 videos.forEach(v=>{
  html+=`
  <div class="video-card" onclick="playVideo('${v.id.videoId}')">
   <img src="${v.snippet.thumbnails.high.url}">
   <div class="video-title">${v.snippet.title}</div>
  </div>`;
 });
 document.getElementById("videoGrid").innerHTML=html;
}

/* SEARCH */
function searchVideos(query){
 let filtered=allVideos.filter(v=>
  v.snippet.title.toLowerCase().includes(query.toLowerCase())
 );
 displayVideos(filtered);
}

/* PLAYER */
function playVideo(id){
 document.getElementById("popup").style.display="flex";
 document.getElementById("player").src=`https://www.youtube.com/embed/${id}?autoplay=1`;
}
function closeVideo(){
 document.getElementById("popup").style.display="none";
 document.getElementById("player").src="";
}

loadDashboard();
loadVideos();

</script>

</body>
 </html>
