<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MR.PY-COBRA • FINAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#00ffcc}
body{font-family:Arial,sans-serif;color:#eaffff;background:url('background.png') center/cover fixed no-repeat}
body::before{content:"";position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:-1}.nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:10px;background:rgba(0,0,0,.5)} .hero{text-align:center;padding:100px 20px} .hero img{width:140px;border-radius:50%;box-shadow:0 0 25px var(--neon)} .hero h1{color:var(--neon);font-size:3em}

.section{margin:40px;text-align:center} iframe{width:90%;max-width:600px;height:340px;border-radius:12px;border:none}

.btn{display:inline-block;margin:10px;padding:12px 25px;background:linear-gradient(45deg,#00ffcc,#0066ff);color:#fff;text-decoration:none;border-radius:25px}

/* chat */ .chat-toggle{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#00ffcc;display:flex;align-items:center;justify-content:center;cursor:pointer} .chat{position:fixed;bottom:90px;right:20px;width:280px;background:#111;border-radius:10px;display:none} .chat header{padding:10px;color:#00ffcc} .chat .msgs{height:150px;overflow:auto;padding:10px} .chat input{width:100%;padding:8px;border:none;background:#000;color:#fff} </style>

</head>
<body><div class="nav">
 <div>MR.PY-COBRA</div>
</div><div class="hero">
 <img src="logo.png">
 <h1>MR.PY-COBRA</h1>
 <p>Stay Relevant</p>
</div><div class="section">
 <h2>📚 Python Playlist</h2>
 <iframe src="https://www.youtube.com/embed?listType=playlist&list=PLL03LmROQCMygglx1-523bHuUtzZCRw22" allowfullscreen></iframe>
</div><div class="section">
 <h2>🐍 Turtle Course</h2>
 <iframe src="https://www.youtube.com/embed?listType=playlist&list=PLL03LmROQCMxavPl8jxIRC-I2-vW6TD3m" allowfullscreen></iframe>
</div><div class="section">
 <h2>📩 Contact</h2>
 <p>anubhavshukla7002@gmail.com</p>
</div><!-- chat --><div class="chat-toggle" onclick="toggleChat()">💬</div>
<div class="chat" id="chatbox">
 <header>PY-COBRA 🤖</header>
 <div class="msgs" id="msgs"></div>
 <input placeholder="Ask Python..." onkeydown="chat(event)">
</div><script>
function toggleChat(){
 let box=document.getElementById('chatbox');
 box.style.display=box.style.display==='block'?'none':'block';
}

function chat(e){
 if(e.key!=='Enter')return;
 let m=e.target.value;
 let r='Try loops, turtle, functions';
 if(/loop/i.test(m)) r='for i in range(5): print(i)';
 if(/turtle/i.test(m)) r='import turtle';
 if(/function/i.test(m)) r='def f(): pass';
 add('You',m);
 add('Bot',r);
 e.target.value='';
}

function add(w,t){
 let box=document.getElementById('msgs');
 box.innerHTML+=`<div><b>${w}:</b> ${t}</div>`;
 box.scrollTop=box.scrollHeight;
}
</script></body>
       </html>
