<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR.PY-COBRA • FINAL BOSS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#00ffcc}
body{
 font-family:Arial;
 color:#eaffff;
 overflow-x:hidden;
 background:radial-gradient(circle at center,#001a18,#000);
}
html{scroll-behavior:smooth}

/* CANVAS */
#bgAnimation{
 position:fixed;
 inset:0;
 z-index:-1;
}

/* NAV */
.nav{
 position:fixed;top:0;width:100%;
 display:flex;justify-content:space-between;
 padding:12px;background:rgba(0,0,0,.6);
 backdrop-filter:blur(10px);
}
.nav a{color:#00ffcc;margin:0 10px;text-decoration:none}

/* SECTION */
.section{padding:100px 20px;text-align:center}

h1,h2{text-shadow:0 0 10px #00ffcc}

/* HERO */
.hero img{width:130px;border-radius:50%;animation:float 3s infinite}
@keyframes float{50%{transform:translateY(-10px)}}

/* DASHBOARD */
.dashboard{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;margin-top:30px;
}
.card{
 background:rgba(255,255,255,0.05);
 padding:20px;border-radius:12px;
 box-shadow:0 0 15px #00ffcc;
}

/* SEARCH */
.search-box input{
 padding:10px;border:none;border-radius:6px;
}

/* VIDEO GRID */
.video-grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;margin-top:30px
}
.video-card{
 background:rgba(255,255,255,0.05);
 border-radius:12px;
 overflow:hidden;
 cursor:pointer;
 transition:.3s;
}
.video-card:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #00ffcc;
}

/* POPUP */
#popup{
 position:fixed;inset:0;
 background:rgba(0,0,0,.9);
 display:none;
 justify-content:center;
 align-items:center;
}
#popup iframe{
 width:90%;max-width:800px;height:450px;
}
#popup span{
 position:absolute;top:20px;right:30px;
 font-size:30px;cursor:pointer;
}

/* NOTES */
.note-card{
 margin:30px auto;padding:20px;
 max-width:700px;
 background:rgba(255,255,255,0.05);
 border-radius:12px;
}
.note-card iframe{
 width:100%;height:300px;border:none;margin:10px 0
}

.btn{
 padding:10px 20px;
 background:#00ffcc;
 color:#000;
 border-radius:6px;
 text-decoration:none;
}
</style>
</head>

<body>

<canvas id="bgAnimation"></canvas>

<!-- NAV -->
<div class="nav">
 <div>MR.PY-COBRA</div>
 <div>
  <a href="#home">Home</a>
  <a href="#dashboard">Dashboard</a>
  <a href="#videos">Videos</a>
  <a href="#notes">Notes</a>
 </div>
</div>

<!-- HOME -->
<div id="home" class="section hero">
 <img src="logo.png">
 <h1>MR.PY-COBRA</h1>
 <p>Stay Relevant</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
 <h2>📊 Dashboard</h2>
 <div class="dashboard">
  <div class="card"><h3>Subscribers</h3><p id="subs">0</p></div>
  <div class="card"><h3>Views</h3><p id="views">0</p></div>
  <div class="card"><h3>Videos</h3><p id="totalVideos">0</p></div>
 </div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
 <h2>🎥 Videos</h2>
 <div class="search-box">
  <input type="text" placeholder="Search..." oninput="searchVideos(this.value)">
 </div>
 <div id="videoGrid" class="video-grid"></div>
</div>

<!-- NOTES -->
<div id="notes" class="section">
 <h2>📄 Notes</h2>

 <div class="note-card">
  <iframe src="turtle_graphics_mrpycobra.pdf"></iframe>
  <a href="turtle_graphics_mrpycobra.pdf" class="btn" download>Download</a>
 </div>

 <div class="note-card">
  <iframe src="python_basics_mrpycobra.pdf"></iframe>
  <a href="python_basics_mrpycobra.pdf" class="btn" download>Download</a>
 </div>

 <div class="note-card">
  <iframe src="fillcolor_all_argument_colors_name.pdf"></iframe>
  <a href="fillcolor_all_argument_colors_name.pdf" class="btn" download>Download</a>
 </div>
</div>

<!-- POPUP -->
<div id="popup">
 <span onclick="closeVideo()">✖</span>
 <iframe id="player"></iframe>
</div>

<script>

/* YOUTUBE */
const API_KEY="AIzaSyC6otTi6DVaCjUSuSWd0Lo9Z2zyEajIuFg";
const CHANNEL_ID="UCGb3jgOzfQsdENrlFWRB_Bw";

let allVideos=[];

function animate(id,end){
 let i=0,step=Math.ceil(end/100);
 let el=document.getElementById(id);
 let int=setInterval(()=>{
  i+=step;
  if(i>=end){i=end;clearInterval(int);}
  el.innerText=i;
 },20);
}

async function loadDashboard(){
 const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
 const d=await r.json();
 let s=d.items[0].statistics;
 animate("subs",+s.subscriberCount);
 animate("views",+s.viewCount);
 animate("totalVideos",+s.videoCount);
}

async function loadVideos(){
 const r=await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&maxResults=12`);
 const d=await r.json();
 allVideos=d.items.filter(v=>v.id.videoId);
 displayVideos(allVideos);
}

function displayVideos(vs){
 let h="";
 vs.forEach(v=>{
  h+=`<div class="video-card" onclick="playVideo('${v.id.videoId}')">
  <img src="${v.snippet.thumbnails.high.url}">
  <div class="video-title">${v.snippet.title}</div></div>`;
 });
 videoGrid.innerHTML=h;
}

function searchVideos(q){
 displayVideos(allVideos.filter(v=>v.snippet.title.toLowerCase().includes(q.toLowerCase())));
}

function playVideo(id){
 popup.style.display="flex";
 player.src=`https://www.youtube.com/embed/${id}?autoplay=1`;
}
function closeVideo(){
 popup.style.display="none";
 player.src="";
}

loadDashboard();
loadVideos();

/* INSANE BACKGROUND */
const c=document.getElementById("bgAnimation");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let mouse={x:0,y:0};
window.onmousemove=e=>{mouse.x=e.x;mouse.y=e.y};

let particles=[];
for(let i=0;i<120;i++){
 particles.push({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  dx:(Math.random()-0.5),
  dy:(Math.random()-0.5)
 });
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 particles.forEach(p=>{
  p.x+=p.dx;
  p.y+=p.dy;

  if(p.x<0||p.x>c.width)p.dx*=-1;
  if(p.y<0||p.y>c.height)p.dy*=-1;

  // draw dot
  ctx.beginPath();
  ctx.arc(p.x,p.y,2,0,Math.PI*2);
  ctx.fillStyle="#00ffcc";
  ctx.fill();

  // connect lines
  particles.forEach(p2=>{
   let dist=Math.hypot(p.x-p2.x,p.y-p2.y);
   if(dist<100){
    ctx.strokeStyle="rgba(0,255,204,0.1)";
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.stroke();
   }
  });

  // mouse interaction
  let md=Math.hypot(p.x-mouse.x,p.y-mouse.y);
  if(md<120){
   p.x+=(mouse.x-p.x)*0.02;
   p.y+=(mouse.y-p.y)*0.02;
  }
 });

 requestAnimationFrame(draw);
}
draw();

window.onclick=e=>{
 for(let i=0;i<10;i++){
  particles.push({x:e.x,y:e.y,dx:(Math.random()-0.5)*4,dy:(Math.random()-0.5)*4});
 }
};

</script>

</body>
   </html>
