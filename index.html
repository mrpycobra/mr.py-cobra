<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR.PY-COBRA • GOD MODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#00ffcc}
html{scroll-behavior:smooth;}

body{
 font-family:Arial;
 color:#eaffff;
 background:#000;
 overflow-x:hidden;
}

/* INTRO */
#intro{
 position:fixed;
 inset:0;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:2em;
 color:#00ffcc;
 z-index:9999;
}

/* PARTICLES */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}

/* NAV */
.nav{
 position:fixed;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:rgba(0,0,0,.6)
}
.nav a{
 color:#00ffcc;
 margin:0 10px;
 text-decoration:none;
}

/* SECTION */
.section{
 padding:100px 20px;
 text-align:center;
 animation:fadeIn 1s ease-in;
}
@keyframes fadeIn{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1;}
}

/* GLOW */
h1,h2,h3{
 text-shadow:0 0 10px #00ffcc;
}

/* FLOAT LOGO */
.hero img{
 width:140px;
 border-radius:50%;
 animation:float 3s infinite;
}
@keyframes float{
 50%{transform:translateY(-10px);}
}

/* BUTTON */
.btn{
 padding:10px 20px;
 background:#00ffcc;
 color:#000;
 margin:10px;
 display:inline-block;
 border-radius:6px;
 transition:.3s;
}
.btn:hover{
 transform:scale(1.1);
 box-shadow:0 0 15px #00ffcc;
}

/* NOTES CARD */
.note-card{
 margin:30px auto;
 padding:20px;
 max-width:700px;
 background:rgba(0,0,0,0.6);
 border-radius:12px;
 box-shadow:0 0 15px #00ffcc;
 transition:0.3s;
}
.note-card:hover{
 transform:scale(1.02);
}
.note-card iframe{
 width:100%;
 height:300px;
 border:none;
 border-radius:10px;
 margin:10px 0;
}

/* SOUND TOGGLE */
#soundToggle{
 position:fixed;
 bottom:20px;
 left:20px;
 background:#00ffcc;
 padding:10px;
 cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">Initializing MR.PY-COBRA...</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- SOUND -->
<audio id="clickSound" src="click.mp3"></audio>
<div id="soundToggle">🔊 Sound ON</div>

<!-- NAV -->
<div class="nav">
 <div>MR.PY-COBRA</div>
 <div>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#videos">Videos</a>
  <a href="#notes">Notes</a>
 </div>
</div>

<!-- HOME -->
<div id="home" class="section hero">
 <img src="logo.png">
 <h1>MR.PY-COBRA</h1>
 <p id="typing"></p>
</div>

<!-- ABOUT -->
<div id="about" class="section">
 <h2>About</h2>
 <p>Learn Python in a powerful way.</p>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
 <h2>Videos</h2>
 <iframe width="300" height="200"
 src="https://www.youtube.com/embed?listType=playlist&list=PLL03LmROQCMygglx1-523bHuUtzZCRw22"></iframe>
</div>

<!-- NOTES (UPDATED WITH PREVIEW) -->
<div id="notes" class="section">
 <h2>📄 Notes</h2>

 <div class="note-card">
  <h3>🐍 Turtle Graphics</h3>
  <iframe src="turtle_graphics_mrpycobra.pdf"></iframe>
  <a href="turtle_graphics_mrpycobra.pdf" class="btn" download>⬇ Download</a>
 </div>

 <div class="note-card">
  <h3>📘 Python Basics</h3>
  <iframe src="python_basics_mrpycobra.pdf"></iframe>
  <a href="python_basics_mrpycobra.pdf" class="btn" download>⬇ Download</a>
 </div>
</div>

<!-- JS -->
<script>

/* INTRO */
setTimeout(()=>{
 document.getElementById("intro").style.display="none";
},2000);

/* TYPING */
let text="Stay Relevant...";
let i=0;
function type(){
 if(i<text.length){
  document.getElementById("typing").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,100);
 }
}
type();

/* SOUND */
let soundOn=true;
const sound=document.getElementById("clickSound");

document.getElementById("soundToggle").onclick=()=>{
 soundOn=!soundOn;
 document.getElementById("soundToggle").innerText=
  soundOn?"🔊 Sound ON":"🔇 Sound OFF";
};

document.querySelectorAll("a,.btn").forEach(el=>{
 el.addEventListener("click",()=>{
  if(soundOn){
   sound.currentTime=0;
   sound.play();
  }
 });
});

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
 particles.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#00ffcc";
 particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fill();
  p.y+=0.5;
  if(p.y>canvas.height)p.y=0;
 });
 requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
